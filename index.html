<script>

const QS = [
  { q:"ජනාධිපති අරමුදලේ වෛද්‍යාධාර ක්‍රමපත්‍ර ගොනු කිරීම සඳහා නිල website ලිපිනය කුමක්ද?", o:["www.presidentfund.gov.lk","www.presidentsfund.gov.lk","www.pfund.lk","www.presidentfund.lk"], a:1 },

  { q:"ජීවනෝපාය රැකියාවක් සඳහා ගොනු ලේඛනය 17 ලෙස ඉදිරිපත් කළ යුතු ලේඛනය:", o:["රැකියාව කරන ස්ථානයේ ඡායාරූප","වෘත්තීය නිපුණතාව සහ මිල ඇස්තමේන්තුව","ග්‍රාම නිලධාරී සහතිකය","වෙනත් රැකියා නොකරන බවට සහතිකය"], a:1 },
  { q:"වෘත්තීය පුහුණු පාඨමාලාවක් සඳහා ඉදිරිපත් කළ යුතු ලේඛනය:", o:["පාසල් අස්වීමේ සහතිකය","උසස් පෙළ ප්‍රතිඵල සටහන","වෘත්තීය ආයතනයෙන් ලිපිය (ගාස්තු සහිතව)","විශ්වවිද්‍යාල ප්‍රවේශ ලිපිය"], a:2 },
  { q:"පාසල් දරුවෙකුට අධ්‍යාපන ආධාර සඳහා ලිපිය ලබා ගත යුත්තේ:", o:["ග්‍රාම නිලධාරීගෙන්","ප්‍රාදේශීය ලේකම්ගෙන්","පාසලේ විදුහල්පතිගෙන්","කලාප අධ්‍යක්ෂගෙන්"], a:2 },
  { q:"ස්ටෙන්ට් 2ක් භාවිත PTCA ප්‍රතිකාර සඳහා ලබාදෙන මුදල:", o:["රු. 200,000","රු. 250,000","රු. 350,000","රු. 300,000"], a:2 },
  { q:"Total Hip Replacement (දෙපස) සඳහා ලබාදෙන මුදල:", o:["රු. 150,000","රු. 175,000","රු. 300,000","රු. 350,000"], a:3 },
  { q:"ධීවර අධ්‍යාපන ආධාර සඳහා ආදායම් සහතිකය ලබා ගත යුත්තේ:", o:["ප්‍රාදේශීය ලේකම්ගෙන්","ග්‍රාම නිලධාරීගෙන්","විදුහල්පතිගෙන්","සමෘද්ධි නිලධාරීගෙන්"], a:1 },
  { q:"වෛද්‍ය ඇස්තමේන්තු වල වලංගු කාලය (validity period):", o:["මාස 01","මාස 03","මාස 06","මාස 12"], a:2 }
];
let G = { name:'', qi:0, score:0 }; let PL = []; let fbDb=null, fbRef=null;
function initFB(){ try{ firebase.initializeApp(FB_CFG); fbDb=firebase.database(); fbRef=fbDb.ref('pfund_ulela_v2/players'); document.getElementById('w-mode').textContent='🌐 Online Mode Ready'; }catch(e){ document.getElementById('w-mode').textContent='📱 Local Mode'; }}
async function loadPL(){ if(fbRef){ const snap=await fbRef.once('value'); const d=snap.val(); PL=d?Object.values(d):[]; PL.sort((a,b)=>b.score-a.score); } }
async function savePL(entry){ const key=entry.name.toLowerCase().replace(/\W/g,'_'); if(fbRef) await fbRef.child(key).set(entry); }
function goTo(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on')); document.getElementById('sc-'+id).classList.add('on'); if(id==='w')drawW(); if(id==='lb') { loadPL().then(renderLB); } if(id==='r')drawR(); }
function startGame(){ const n=document.getElementById('inp-n').value.trim(); if(!n){ document.getElementById('n-err').style.display='block'; return; } G={name:n, qi:0, score:0}; goTo('g'); renderQ(); }
function renderQ(){ const q=QS[G.qi]; document.getElementById('q-txt').textContent=q.q; document.getElementById('pbar').style.width=(G.qi/TOTAL_Q*100)+'%'; const od=document.getElementById('q-opts'); od.innerHTML=''; q.o.forEach((o,i)=>{ const b=document.createElement('button'); b.className='opt'; b.textContent=o; b.onclick=()=>answerQ(i); od.appendChild(b); }); document.getElementById('btn-nxt').style.display='none'; drawG(); }
function answerQ(idx){ const q=QS[G.qi]; if(idx===q.a) G.score++; document.querySelectorAll('.opt').forEach((b,i)=>{ b.disabled=true; if(i===q.a) b.classList.add('ok'); else if(i===idx) b.classList.add('no'); }); document.getElementById('btn-nxt').style.display='block'; drawG(idx===q.a); }
async function nextQ(){ G.qi++; if(G.qi>=TOTAL_Q){ const entry={name:G.name, score:G.score, date:new Date().toLocaleDateString()}; await savePL(entry); document.getElementById('r-nm').textContent=G.name; document.getElementById('r-sc').textContent=G.score+'/10'; goTo('r'); } else renderQ(); }

function doLogin(){ if(document.getElementById('adm-u').value==ADMIN.u && document.getElementById('adm-p').value==ADMIN.p){ document.getElementById('adm-lgn').style.display='none'; document.getElementById('adm-dsh').style.display='block'; loadPL().then(renderAdmDsh); } }

function rr(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.fill(); }
